
services:

  # 1. MYSQL ENTERPRISE LEDGER CONTAINER
  mysql-db:
    image: mysql:8.0
    container_name: finflow-mysql
    environment:
      MYSQL_ROOT_PASSWORD: "Sonu@05mysql"
      MYSQL_DATABASE: "finflow_db"

    ports:
      - "3307:3306"
    volumes:
      - mysql_persistent_data:/var/lib/mysql
    # Automated pulse check to verify the database is fully initialized
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pSonu@05mysql"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - finflow-cluster-net

  # 2. REDIS DISTRIBUTED CACHE CONTAINER
  redis-cache:
    image: redis:7.2-alpine
    container_name: finflow-redis
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - finflow-cluster-net

  # 3. FINFLOW SPRING BOOT CORE API CONTAINER
  finflow-api:
    build:
      context: ./finflow-api
      dockerfile: Dockerfile
    container_name: finflow-backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    depends_on:
      mysql-db:
        condition: service_healthy
      redis-cache:
        condition: service_healthy
    networks:
      - finflow-cluster-net

volumes:
  mysql_persistent_data:

networks:
  finflow-cluster-net:
    driver: bridge